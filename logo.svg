<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <defs>
    <clipPath id="clip-left">
      <rect x="0" y="0" width="20" height="40"/>
    </clipPath>
    <clipPath id="clip-right">
      <rect x="20" y="0" width="20" height="40"/>
    </clipPath>
  </defs>
  <!-- 字母 B 左半白 右半金 -->
  <text x="0" y="34" font-family="Georgia,Times New Roman,serif" font-size="42" font-weight="700" fill="#ffffff" clip-path="url(#clip-left)">B</text>
  <text x="0" y="34" font-family="Georgia,Times New Roman,serif" font-size="42" font-weight="700" fill="#C8860A" clip-path="url(#clip-right)">B</text>
  <!-- 右侧文字 -->
  <text x="48" y="16" font-family="'Barlow Condensed',Arial Narrow,sans-serif" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="1">BALANCE INDUSTRY</text>
  <text x="48" y="32" font-family="'Barlow Condensed',Arial Narrow,sans-serif" font-size="11" font-weight="400" fill="#C8860A" letter-spacing="0.5">Group Co., Limited</text>
</svg>
